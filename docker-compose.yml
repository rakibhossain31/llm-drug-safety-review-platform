services:
  api:
    build: .
    command: uvicorn safetyreview_ai.api.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_PATH=/app/runtime/safetyreview.db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - safety_runtime:/app/runtime

  dashboard:
    build: .
    command: streamlit run dashboards/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      - PYTHONPATH=/app/src
      - API_BASE_URL=http://api:8000
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  safety_runtime:
